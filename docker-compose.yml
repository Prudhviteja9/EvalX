# ============================================================
# Docker Compose - Run API + Dashboard with ONE command
# ============================================================
#
# To use:
#   docker compose up
#
# This starts BOTH:
#   API at       http://localhost:8000
#   Dashboard at http://localhost:8501

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: streamlit run streamlit_app/dashboard.py --server.port 8501 --server.address 0.0.0.0
